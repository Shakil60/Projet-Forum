{{define "title"}}Connexion — CinéTalk{{end}}
{{define "content"}}
<div class="form-card narrow">
    <h1>Connexion</h1>

    {{if .Error}}<p class="error">{{.Error}}</p>{{end}}

    <form method="POST" action="/login">
        <label>
            Nom d'utilisateur ou e-mail
            <input type="text" name="identifiant" value="{{.Identifiant}}" required autofocus
                   autocomplete="username" autocapitalize="off" spellcheck="false">
        </label>
        <label>
            Mot de passe
            <input type="password" name="mot_de_passe" required autocomplete="current-password">
        </label>
        <button type="submit" class="btn btn-accent btn-block">Se connecter</button>
    </form>

    <p class="form-switch">Pas encore de compte ? <a href="/register">Inscrivez-vous</a></p>
</div>
{{end}}
