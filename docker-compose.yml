services:
  db:
    image: mysql:8.0
    container_name: cinetalk-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PWD:-cinetalk}
      MYSQL_DATABASE: ${DB_NAME:-cinetalk}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      # Les scripts sont joues automatiquement au premier demarrage (ordre alphabetique)
      - ./migration/script.sql:/docker-entrypoint-initdb.d/01-script.sql:ro
      - ./migration/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${DB_PWD:-cinetalk}"]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    build: .
    container_name: cinetalk-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_NAME: ${DB_NAME:-cinetalk}
      DB_USER: ${DB_USER:-root}
      DB_PWD: ${DB_PWD:-cinetalk}
      DB_HOST: db
      DB_PORT: 3306
      JWT_SECRET: ${JWT_SECRET:-cinetalk_dev_secret_change_me}
      SERVER_PORT: 8080
      TMDB_API_KEY: ${TMDB_API_KEY:-}
    ports:
      - "8080:8080"

volumes:
  db_data:
